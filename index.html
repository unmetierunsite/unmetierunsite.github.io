  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Work Sans', sans-serif; background: #faf9ff; color: #1a1b21; overflow-x: hidden; }

    /* Craft gradient */
    .craft-gradient { background: linear-gradient(135deg, #003a84 0%, #1e51a4 100%); }
    .craft-gradient-text { background: linear-gradient(135deg, #003a84 0%, #1e51a4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Glass nav */
    .glass-nav { backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); background: rgba(250,249,255,0.88); }

    /* Scroll reveal */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.72s cubic-bezier(0.16,1,0.3,1), transform 0.72s cubic-bezier(0.16,1,0.3,1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.08s; }
    .reveal-delay-2 { transition-delay: 0.16s; }
    .reveal-delay-3 { transition-delay: 0.24s; }
    .reveal-delay-4 { transition-delay: 0.32s; }
    .reveal-delay-5 { transition-delay: 0.40s; }

    /* Typewriter cursor */
    .tw-cursor { display: inline-block; width: 3px; height: 0.85em; background: #003a84; margin-left: 3px; vertical-align: text-bottom; animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Marquee */
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .marquee-inner { display: flex; width: max-content; animation: marquee 32s linear infinite; }
    .marquee-inner:hover { animation-play-state: paused; }

    /* Float */
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .animate-float { animation: float 4.5s ease-in-out infinite; }

    /* Pulse dot */
    @keyframes pulse-dot { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.6; } }
    .animate-pulse-dot { animation: pulse-dot 2.2s ease-in-out infinite; }

    /* Hover lift */
    .hover-lift { transition: transform 0.38s cubic-bezier(0.16,1,0.3,1), box-shadow 0.38s ease; }
    .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 20px 44px rgba(0,58,132,0.09); }

    /* Button press */
    .btn-press:active { transform: scale(0.97) translateY(1px); }

    /* Portfolio asymmetric grid */
    .portfolio-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
